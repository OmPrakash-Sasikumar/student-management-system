<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css?v=10">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>Admin</h2>
        <ul>
            <li onclick="goHome()">Students</li>
            <li onclick="goDashboard()">Dashboard</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </div>

    <div class="main">

        <h1>Student Management System</h1>

        <div class="form-box">
            <input type="text" id="name" placeholder="Student Name">
            <input type="text" id="roll" placeholder="Roll Number">
            <input type="text" id="dept" placeholder="Department">
            <input type="date" id="dob">
            <input type="text" id="phone" placeholder="Phone Number">
            <input type="text" id="address" placeholder="Address">
            <input type="number" id="marks" placeholder="Marks">
            <button id="addStudent">Add Student</button>
        </div>

        <input type="text" id="searchBox" placeholder="Search Student by Name">

        <h3 id="count">Total Students: 0</h3>

        <div class="action-buttons">
            <button id="clearAll">Clear All</button>
            <button id="sortBtn">Sort A-Z</button>
            <button onclick="exportData()">Export CSV</button>
        </div>

        <h2>Student List</h2>
        <ul id="studentList"></ul>

        <div id="profileBox" class="profile-box" style="display:none;">
            <h3>Student Details</h3>
            <p id="p_name"></p>
            <p id="p_roll"></p>
            <p id="p_dept"></p>
            <p id="p_dob"></p>
            <p id="p_phone"></p>
            <p id="p_address"></p>
            <p id="p_marks"></p>
            <p id="p_grade"></p>
            <p id="p_age"></p>
        </div>

        <p id="message"></p>

    </div>

</div>

<script src="script.js?v=10"></script>

</body>
</html>
